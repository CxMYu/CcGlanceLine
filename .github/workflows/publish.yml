name: Publish to npm

# 触发方式：
#   1) 在 GitHub 上「创建一个 Release」时自动发布(推荐，可控且带版本 tag)
#   2) 手动在 Actions 页点 "Run workflow"
on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write   # OIDC：npm 可信发布(Trusted Publishing)+ 自动 provenance 所需

jobs:
  publish:
    runs-on: ubuntu-latest   # 可信发布仅支持 GitHub 托管 runner
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22            # 需 Node >= 22.14.0
          registry-url: https://registry.npmjs.org

      # 可信发布要求 npm CLI >= 11.5.1，而 Node 22 自带的是 npm 10.x，这里升级。
      - run: npm install -g npm@latest
      - run: npm --version

      # npm ci 会按 lockfile 安装 devDeps，并触发 prepare 脚本编译 dist/
      - run: npm ci

      - run: npm run typecheck
      - run: npm test

      # 无需 NPM_TOKEN：npm 通过 OIDC 向 registry 换取短时令牌发布。
      # 公开仓库 + 公开包会自动生成 provenance，无需 --provenance 标志。
      # 前提：已在 npmjs.com 的包 Settings 里配置了指向本仓库 + 本 workflow 的 Trusted Publisher。
      - run: npm publish --access public

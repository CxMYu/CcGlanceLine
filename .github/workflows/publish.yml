name: Publish to npm

# 触发方式：
#   1) 在 GitHub 上「创建一个 Release」时自动发布(推荐，可控且带版本 tag)
#   2) 手动在 Actions 页点 "Run workflow"
on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write   # provenance 需要 OIDC 身份令牌(token 认证下也可生成来源证明)

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      # npm ci 按 lockfile 安装 devDeps，并触发 prepare 脚本编译 dist/
      - run: npm ci

      - run: npm run typecheck
      - run: npm test

      # 用 NPM_TOKEN 认证发布；--provenance 生成来源证明；--access public 显式公开。
      # ⚠️ 仓库 secret NPM_TOKEN 必须是「能绕过 2FA」的 token
      # (Classic Automation，或勾了 bypass 2FA 的 Granular)，否则会 403。
      - run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
